<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuesioner Seminar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <main id="view-peserta" class="max-w-md mx-auto p-4 space-y-6 pt-10">
        <!-- Pintu Masuk Biodata -->
        <div id="participant-gate" class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl space-y-4">
            <div class="text-center">
                <h2 class="text-xl font-black text-amber-400">Kuesioner Seminar</h2>
                <p class="text-xs text-slate-400">Silakan lengkapi profil Anda untuk memulai.</p>
            </div>
            <input type="text" id="p-name" placeholder="Nama Lengkap" class="w-full p-2.5 rounded-xl bg-slate-900 border border-slate-700 text-white text-sm focus:outline-none">
            <input type="text" id="p-role" placeholder="Contoh: Staff / Supervisor" class="w-full p-2.5 rounded-xl bg-slate-900 border border-slate-700 text-white text-sm focus:outline-none">
            <input type="text" id="p-area" placeholder="Contoh: Jakarta / Surabaya" class="w-full p-2.5 rounded-xl bg-slate-900 border border-slate-700 text-white text-sm focus:outline-none">
            <button onclick="loadAndStartQuiz()" id="start-btn" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 font-black py-3 rounded-xl shadow-lg uppercase text-sm">
                Buka & Mulai Kuesioner Soal 🚀
            </button>
        </div>

        <!-- Tempat Pengerjaan Soal -->
        <div id="participant-quiz" class="hidden space-y-4 pb-12">
            <div class="bg-indigo-600 p-4 rounded-xl shadow flex justify-between items-center text-white text-xs">
                <div>
                    <p class="opacity-75">Peserta:</p>
                    <p id="display-p-name" class="font-bold text-sm"></p>
                </div>
                <div class="bg-black/30 px-3 py-1 rounded-lg font-mono text-[11px]">
                    Terjawab: <span id="progress-status">0</span> Soal
                </div>
            </div>

            <div id="questions-container" class="space-y-4"></div>

            <button onclick="submitQuizFinal()" id="submit-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black py-3 rounded-xl shadow-lg text-sm uppercase mt-4">
                Kirim Lembar Jawaban Selesai 🏁
            </button>
        </div>

        <!-- Layar Sukses Selesai Kirim -->
        <div id="participant-success" class="hidden bg-slate-800 p-8 rounded-2xl border border-slate-700 text-center space-y-4 shadow-xl">
            <div class="text-5xl">🎉</div>
            <h2 class="text-xl font-black text-emerald-400">Jawaban Berhasil Dikirim!</h2>
            <p class="text-xs text-slate-300">Terima kasih atas partisipasi Anda. Data rekap telah terkunci di sistem Trainer.</p>
        </div>
    </main>

    <script>
        const dbBucket = "nadia24021986pwa624x"; 
        let bankSoalPeserta = [];
        let jawabanPeserta = {};

        async function loadAndStartQuiz() {
            const nama = document.getElementById('p-name').value.trim();
            const jabatan = document.getElementById('p-role').value.trim();
            const area = document.getElementById('p-area').value.trim();
            if(!nama || !jabatan || !area) { alert('Mohon isi semua kolom biodata!'); return; }
            const btn = document.getElementById('start-btn');
            btn.innerText = "MEMANGGIL SOAL... ⏳";

            try {
                const res = await fetch(`https://kvdb.io/${dbBucket}/live_soal`);
                if(!res.ok) throw new Error();
                bankSoalPeserta = await res.json() || [];
                
                document.getElementById('display-p-name').innerText = nama;
                document.getElementById('participant-gate').classList.add('hidden');
                document.getElementById('participant-quiz').classList.remove('hidden');
                renderQuizContent();
            } catch (e) {
                alert('Belum ada kuesioner aktif saat ini. Silakan hubungi Trainer Anda.');
                btn.innerText = "Buka & Mulai Kuesioner Soal 🚀";
            }
        }

        function renderQuizContent() {
            const container = document.getElementById('questions-container');
            if(bankSoalPeserta.length === 0) {
                container.innerHTML = '<div class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-center font-bold text-xs">Tidak ada soal aktif saat ini.</div>'; return;
            }
            container.innerHTML = bankSoalPeserta.map((q, idx) => {
                const imgHtml = q.image ? `<img src="${q.image}" class="w-full h-auto max-h-40 object-contain rounded-xl mb-3 border border-slate-200">` : '';
                let formHtml = '';

                if(q.type === 'ganda') {
                    formHtml = `
                        <div class="grid grid-cols-1 gap-1.5 text-xs text-slate-800">
                            <button onclick="selectGanda(this, '${q.id}', 'A')" class="opt-${q.id} w-full text-left p-2.5 rounded-xl border border-slate-200 flex items-center gap-2 bg-slate-50 hover:bg-slate-100 transition"> <span class="w-5 h-5 flex items-center justify-center rounded-full bg-slate-800 text-white font-bold text-[10px]">A</span> ${q.optA} </button>
                            <button onclick="selectGanda(this, '${q.id}', 'B')" class="opt-${q.id} w-full text-left p-2.5 rounded-xl border border-slate-200 flex items-center gap-2 bg-slate-50 hover:bg-slate-100 transition"> <span class="w-5 h-5 flex items-center justify-center rounded-full bg-slate-800 text-white font-bold text-[10px]">B</span> ${q.optB} </button>
                            <button onclick="selectGanda(this, '${q.id}', 'C')" class="opt-${q.id} w-full text-left p-2.5 rounded-xl border border-slate-200 flex items-center gap-2 bg-slate-50 hover:bg-slate-100 transition"> <span class="w-5 h-5 flex items-center justify-center rounded-full bg-slate-800 text-white font-bold text-[10px]">C</span> ${q.optC} </button>
                            <button onclick="selectGanda(this, '${q.id}', 'D')" class="opt-${q.id} w-full text-left p-2.5 rounded-xl border border-slate-200 flex items-center gap-2 bg-slate-50 hover:bg-slate-100 transition"> <span class="w-5 h-5 flex items-center justify-center rounded-full bg-slate-800 text-white font-bold text-[10px]">D</span> ${q.optD} </button>
                        </div>`;
                } else {
                    formHtml = `<input type="text" oninput="saveIsian('${q.id}', this.value)" placeholder="Ketik jawaban di sini..." class="w-full p-2.5 rounded-xl border border-slate-300 text-xs text-slate-900 focus:outline-none focus:border-indigo-500">`;
                }
                return `<div class="bg-white text-slate-900 p-5 rounded-2xl shadow-xl space-y-2">
                    <span class="bg-indigo-100 text-indigo-800 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase">Pertanyaan ${idx + 1}</span>
                    <h3 class="text-sm font-bold leading-snug">${q.question}</h3> ${imgHtml} ${formHtml}
                </div>`;
            }).join('');
        }

        function selectGanda(btn, qId, val) {
            document.querySelectorAll(`.opt-${qId}`).forEach(el => {
                el.classList.remove('border-indigo-600', 'bg-indigo-50'); el.children[0].classList.replace('bg-indigo-600', 'bg-slate-800');
            });
            btn.classList.add('border-indigo-600', 'bg-indigo-50'); btn.children[0].classList.replace('bg-slate-800', 'bg-indigo-600');
            jawabanPeserta[qId] = val; document.getElementById('progress-status').innerText = Object.keys(jawabanPeserta).length;
        }

        function saveIsian(qId, val) {
            if(val.trim() === '') { delete jawabanPeserta[qId]; } else { jawabanPeserta[qId] = val.trim(); }
            document.getElementById('progress-status').innerText = Object.keys(jawabanPeserta).length;
        }

        async function submitQuizFinal() {
            const nama = document.getElementById('p-name').value.trim();
            const jabatan = document.getElementById('p-role').value.trim();
            const area = document.getElementById('p-area').value.trim();
            const btn = document.getElementById('submit-btn');

            btn.innerText = "MENGIRIM... 🏁"; btn.disabled = true;
            let benar = 0;
            bankSoalPeserta.forEach(q => {
                const ansPeserta = jawabanPeserta[q.id] ? jawabanPeserta[q.id].toString().trim().toLowerCase() : '';
                const ansKunci = q.key ? q.key.toString().trim().toLowerCase() : '';
                if(ansPeserta === ansKunci) { benar++; }
            });

            const skorAkhir = bankSoalPeserta.length > 0 ? Math.round((benar / bankSoalPeserta.length) * 100) : 0;

            try {
                let currentSubmissions = [];
                const getRes = await fetch(`https://kvdb.io/${dbBucket}/submissions`);
                if(getRes.ok) { currentSubmissions = await getRes.json() || []; }
                currentSubmissions.push({ nama, jabatan, area, skor: skorAkhir });

                await fetch(`https://kvdb.io/${dbBucket}/submissions`, {
                    method: 'POST',
                    body: JSON.stringify(currentSubmissions)
                });
                document.getElementById('participant-quiz').classList.add('hidden');
                document.getElementById('participant-success').classList.remove('hidden');
            } catch(e) {
                alert('Gagal mengirim. Sinyal tidak stabil, coba lagi.');
                btn.innerText = "Kirim Lembar Jawaban Selesai 🏁"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
